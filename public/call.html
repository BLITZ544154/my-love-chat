<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-SPACE CALL</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --danger: #ff4b2b; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .call-screen { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 110px; height: 150px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; background: #222; z-index: 10; transition: 0.3s; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .peer-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 20px var(--primary); }
        .status-text { font-size: 16px; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; animation: pulse 1.5s infinite; }
        
        .controls { position: absolute; bottom: 40px; display: flex; gap: 20px; z-index: 30; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-hangup { background: var(--danger); color: white; }
        .btn-mute { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(10px); }
        .btn-mute.active { background: var(--primary); color: black; }
        .btn-accept { background: #00ff88; color: black; }
        .btn:active { transform: scale(0.9); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div id="incoming-overlay" class="overlay" style="display: none;">
            <img id="caller-img" src="https://via.placeholder.com/150" class="peer-avatar">
            <h3 id="caller-name">Unknown User</h3>
            <p class="status-text">Incoming Call...</p>
            <div class="controls">
                <button class="btn btn-accept" onclick="answerCall()"><i class="fas fa-phone"></i></button>
                <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>

        <div id="outgoing-overlay" class="overlay" style="display: none;">
            <img id="peer-img-call" src="https://via.placeholder.com/150" class="peer-avatar">
            <h3 id="peer-name-call">User</h3>
            <p class="status-text">Calling...</p>
            <div class="controls">
                <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>

        <div id="ongoing-controls" class="controls" style="display: none;">
            <button class="btn btn-mute" onclick="toggleMute()"><i id="mic-icon" class="fas fa-microphone"></i></button>
            <button class="btn btn-mute" onclick="toggleVideo()"><i id="vid-icon" class="fas fa-video"></i></button>
            <button class="btn btn-mute" onclick="shareScreen()"><i class="fas fa-desktop"></i></button>
            <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script>
        const socket = io({ auth: { token: localStorage.getItem('token') } });
        const myPhone = localStorage.getItem('user_phone');
        const params = new URLSearchParams(window.location.search);
        const peerPhone = params.get('user');
        const isCaller = params.get('caller') === 'true';
        const callType = params.get('type') || 'video';

        let localStream;
        let peer;
        let incomingSignalData;
        let screenStream;

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: callType === 'video', 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = localStream;

                const res = await fetch(`/api/user/${peerPhone}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const userData = await res.json();
                if(userData) {
                    const name = userData.name || peerPhone;
                    const img = userData.avatar || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + peerPhone;
                    document.getElementById('peer-name-call').innerText = name;
                    document.getElementById('caller-name').innerText = name;
                    document.getElementById('peer-img-call').src = img;
                    document.getElementById('caller-img').src = img;
                }

                if (isCaller) {
                    document.getElementById('outgoing-overlay').style.display = 'flex';
                    startCall();
                }
            } catch (err) {
                console.error(err);
                alert("Please enable Camera/Mic!");
                window.location.href = '/messages';
            }
        }

        function startCall() {
            peer = new SimplePeer({ initiator: true, trickle: false, stream: localStream });
            peer.on('signal', data => {
                socket.emit('call-user', { 
                    userToCall: peerPhone, 
                    signalData: data, 
                    from: myPhone, 
                    type: callType 
                });
            });
            peer.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                hideOverlays();
            });
        }

        socket.on('incoming-call', (data) => {
            if (!isCaller && data.from === peerPhone) {
                incomingSignalData = data.signal;
                document.getElementById('incoming-overlay').style.display = 'flex';
                document.getElementById('ringtone').play();
            }
        });

        function answerCall() {
            document.getElementById('ringtone').pause();
            peer = new SimplePeer({ initiator: false, trickle: false, stream: localStream });
            peer.on('signal', signal => {
                socket.emit('answer-call', { signal, to: peerPhone });
            });
            peer.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                hideOverlays();
            });
            peer.signal(incomingSignalData);
        }

        socket.on('call-accepted', signal => {
            if(peer) peer.signal(signal);
            hideOverlays();
        });

        async function shareScreen() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const screenTrack = screenStream.getVideoTracks()[0];
                
                if (peer) {
                    const videoSender = peer._pc.getSenders().find(s => s.track.kind === 'video');
                    if (videoSender) videoSender.replaceTrack(screenTrack);
                }
                
                document.getElementById('local-video').srcObject = screenStream;
                screenTrack.onended = () => {
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (peer) {
                        const videoSender = peer._pc.getSenders().find(s => s.track.kind === 'video');
                        videoSender.replaceTrack(videoTrack);
                    }
                    document.getElementById('local-video').srcObject = localStream;
                };
            } catch (err) { console.error(err); }
        }

        function toggleMute() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mic-icon').className = track.enabled ? 'fas fa-microphone' : 'fas fa-microphone-slash';
        }

        function toggleVideo() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('vid-icon').className = track.enabled ? 'fas fa-video' : 'fas fa-video-slash';
        }

        function hideOverlays() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            document.getElementById('ongoing-controls').style.display = 'flex';
        }

        function endCall() {
            socket.emit('end-call', { to: peerPhone });
            location.href = '/messages';
        }

        socket.on('call-ended', () => {
            location.href = '/messages';
        });

        init();
    </script>
</body>
</html>
