<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-SPACE CALL</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --danger: #ff4b2b; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .call-screen { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid var(--primary); object-fit: cover; background: #222; z-index: 10; transition: 0.3s; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .peer-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 20px var(--primary); }
        .status-text { font-size: 16px; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; animation: pulse 1.5s infinite; }
        .controls { position: absolute; bottom: 40px; display: flex; gap: 30px; z-index: 30; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-hangup { background: var(--danger); color: white; }
        .btn-mute { background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(10px); }
        .btn-accept { background: #00ff88; color: black; }
        .btn:active { transform: scale(0.9); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div id="incoming-overlay" class="overlay" style="display: none;">
            <img id="caller-img" src="https://via.placeholder.com/150" class="peer-avatar">
            <h3 id="caller-name">Unknown User</h3>
            <p class="status-text">Incoming Call...</p>
            <div class="controls">
                <button class="btn btn-accept" onclick="answerCall()"><i class="fas fa-phone"></i></button>
                <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>

        <div id="outgoing-overlay" class="overlay" style="display: none;">
            <img id="peer-img-call" src="https://via.placeholder.com/150" class="peer-avatar">
            <h3 id="peer-name-call">User</h3>
            <p class="status-text">Calling...</p>
            <div class="controls">
                <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>

        <div id="ongoing-controls" class="controls" style="display: none;">
            <button class="btn btn-mute" onclick="toggleMute()"><i id="mic-icon" class="fas fa-microphone"></i></button>
            <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script>
        const socket = io({
            auth: {
                token: localStorage.getItem('token')
            }
        });
        const myPhone = localStorage.getItem('user_phone');
        const params = new URLSearchParams(window.location.search);
        const peerPhone = params.get('user');
        const isCaller = params.get('caller') === 'true';
        const callType = params.get('type') || 'video';

        let localStream;
        let peer;
        let incomingSignalData;

        async function init() {
            try {
                // User က အသံပဲခေါ်တာလား ဗီဒီယိုလား စစ်မယ်
                const constraints = { 
                    video: callType === 'video', 
                    audio: true 
                };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('local-video').srcObject = localStream;
                if(callType === 'voice') document.getElementById('local-video').style.display = 'none';

                // တစ်ဖက်လူရဲ့ Info ကို ဆွဲမယ်
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/user/${peerPhone}`, {
                    headers: {
                        'Authorization': token ? `Bearer ${token}` : ''
                    }
                });
                const userData = await res.json();
                if(userData) {
                    const name = userData.name || peerPhone;
                    const img = userData.avatar || "https://via.placeholder.com/150";
                    document.getElementById('peer-name-call').innerText = name;
                    document.getElementById('caller-name').innerText = name;
                    document.getElementById('peer-img-call').src = img;
                    document.getElementById('caller-img').src = img;
                }

                if (isCaller) {
                    showOutgoing();
                    startCall();
                }
            } catch (err) {
                alert("Camera/Mic access is required for calls!");
                window.location.href = '/messages';
            }
        }

        function startCall() {
            peer = new SimplePeer({ initiator: true, trickle: false, stream: localStream });
            
            peer.on('signal', data => {
                socket.emit('call-user', { 
                    userToCall: peerPhone, 
                    signalData: data, 
                    from: myPhone, 
                    type: callType 
                });
            });

            peer.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                hideOverlays();
            });
        }

        socket.on('incoming-call', (data) => {
            if (!isCaller && data.from === peerPhone) {
                incomingSignalData = data.signal;
                document.getElementById('incoming-overlay').style.display = 'flex';
                document.getElementById('ringtone').play();
            }
        });

        function answerCall() {
            document.getElementById('ringtone').pause();
            peer = new SimplePeer({ initiator: false, trickle: false, stream: localStream });
            
            peer.on('signal', signal => {
                socket.emit('answer-call', { signal, to: peerPhone });
            });

            peer.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                hideOverlays();
            });

            peer.signal(incomingSignalData);
        }

        socket.on('call-accepted', signal => {
            if(peer) peer.signal(signal);
            hideOverlays();
        });

        function showOutgoing() {
            document.getElementById('outgoing-overlay').style.display = 'flex';
        }

        function hideOverlays() {
            document.getElementById('incoming-overlay').style.display = 'none';
            document.getElementById('outgoing-overlay').style.display = 'none';
            document.getElementById('ongoing-controls').style.display = 'flex';
        }

        function endCall() {
            socket.emit('end-call', { to: peerPhone });
            stopTracks();
            window.location.href = '/messages';
        }

        socket.on('call-ended', () => {
            stopTracks();
            window.location.href = '/messages';
        });

        function stopTracks() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        }

        function toggleMute() {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('mic-icon').className = audioTrack.enabled ? 'fas fa-microphone' : 'fas fa-microphone-slash';
        }

        init();
    </script>
</body>
</html>
