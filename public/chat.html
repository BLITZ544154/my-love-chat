<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Global Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; height:100vh; display:flex; flex-direction:column; overflow: hidden; }
        
        /* Header */
        .chat-header { padding:20px; background:#111; border-bottom:1px solid #222; display:flex; align-items:center; gap:15px; position: sticky; top: 0; z-index: 10; }
        .chat-header i { cursor: pointer; font-size: 18px; }

        /* Chat Display Area */
        #chat-box { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .msg { max-width:80%; padding:12px 18px; border-radius:20px; font-size:14px; line-height:1.4; position:relative; word-wrap: break-word; }
        .msg.other { background:#1a1a1a; align-self:flex-start; border-bottom-left-radius:5px; }
        .msg.me { background:var(--c1); color:#000; align-self:flex-end; border-bottom-right-radius:5px; font-weight:600; }
        
        .sender { font-size:10px; margin-bottom:4px; display:block; opacity:0.7; }
        .owner-tag { color:#ffd700; font-weight:900; font-size:9px; border:1px solid #ffd700; padding:1px 4px; border-radius:4px; margin-right:5px; background: rgba(255,215,0,0.1); }
        .vip-name-chat { color: #ffd700 !important; }

        /* Image Message Style */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* Input Area */
        .input-area { padding:20px; background:#111; display:flex; gap:10px; align-items: center; border-top: 1px solid #222; }
        input { flex:1; background:#1a1a1a; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; outline:none; transition: 0.3s; }
        input:focus { border-color: var(--c1); }
        
        .icon-btn { background:none; border:none; color:#555; font-size:20px; cursor:pointer; transition: 0.3s; }
        .icon-btn:hover { color: var(--c1); }
        .send-btn { background:var(--c1); border:none; width:50px; height:50px; border-radius:15px; cursor:pointer; display: flex; justify-content: center; align-items: center; }
        
        /* Hidden File Input */
        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard'"></i>
        <div>
            <div style="font-weight:900; letter-spacing: 1px;">GLOBAL CHAT</div>
            <div style="font-size:10px; color:var(--c1);"><i class="fas fa-circle" style="font-size:8px;"></i> Online Users</div>
        </div>
    </div>

    <div id="chat-box">
        <div class="msg other">
            <span class="sender"><span class="owner-tag">SYSTEM</span>Z-SPACE BOT</span>
            Welcome to the encrypted global chat! Stay safe. 🚀
        </div>
    </div>

    <div class="input-area">
        <button class="icon-btn" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-image"></i>
        </button>
        <input type="file" id="file-input" accept="image/*" onchange="sendImage(this)">
        
        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
        
        <button class="send-btn" onclick="sendMsg()">
            <i class="fas fa-paper-plane" style="color:#000;"></i>
        </button>
    </div>

    <script>
        const myPhone = "09688543022"; // မင်းရဲ့ Owner နံပါတ်
        const userPhone = localStorage.getItem('user_phone');
        const userName = localStorage.getItem('glow_user') || "User";

        // စာပို့တဲ့ Logic
        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            createBubble(text, 'text');
            input.value = '';
        }

        // ပုံပို့တဲ့ Logic
        function sendImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    createBubble(e.target.result, 'image');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Bubble ဖန်တီးခြင်း
        function createBubble(content, type) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg me';
            
            // Owner ဖြစ်ရင် Tag နဲ့ VIP Style ထည့်မယ်
            let isOwner = (userPhone === myPhone);
            let tag = isOwner ? '<span class="owner-tag">OWNER</span>' : '';
            let senderName = `<span class="sender ${isOwner ? 'vip-name-chat' : ''}">${tag}${userName}</span>`;

            if(type === 'text') {
                msgDiv.innerHTML = `${senderName}${content}`;
            } else {
                msgDiv.innerHTML = `${senderName}<img src="${content}" class="chat-img" onclick="window.open(this.src)">`;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
