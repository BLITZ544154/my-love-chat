<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --me-bg: #00f2ff; --other-bg: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { padding: 15px; background: #0a0a0a; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }
        .user-info h4 { margin: 0; font-size: 16px; color: var(--primary); }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; cursor: pointer; transition: 0.2s; }
        .msg:active { transform: scale(0.98); opacity: 0.8; }
        
        .me { align-self: flex-end; background: var(--me-bg); color: #000; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--other-bg); color: #fff; border-bottom-left-radius: 4px; }
        .edit-tag { font-size: 9px; opacity: 0.6; margin-left: 5px; font-style: italic; }
        
        /* Input Area */
        .input-area { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #1a1a1a; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: var(--primary); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info" style="display: flex; align-items: center; gap: 10px;">
            <img src="https://i.ibb.co/vzPRm9r/blitz-profile.jpg" alt="User">
            <div>
                <h4 id="target-user">Global Chat</h4>
                <small style="color: #555;">Online</small>
            </div>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <button style="color: #888; background: none; border: none; font-size: 20px;"><i class="fas fa-plus"></i></button>
        <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const sender = localStorage.getItem('user_phone') || 'Guest';
        const urlParams = new URLSearchParams(window.location.search);
        const receiver = urlParams.get('user') || 'Global';
        document.getElementById('target-user').innerText = receiver;

        async function loadMessages() {
            try {
                const res = await fetch(`/api/messages/${sender}/${receiver}`);
                const msgs = await res.json();
                const box = document.getElementById('chat-box');
                
                box.innerHTML = msgs.map(m => `
                    <div class="msg ${m.sender === sender ? 'me' : 'other'}" onclick="showOptions('${m._id}', '${m.text}', '${m.sender}')">
                        ${m.text} ${m.isEdited ? '<span class="edit-tag">(edited)</span>' : ''}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            } catch (e) { console.error("Load Error:", e); }
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;

            const data = { sender, receiver, text: input.value };
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            input.value = '';
            loadMessages();
        }

        // Edit/Delete Functionality
        async function showOptions(id, text, s) {
            if(s !== sender) return;
            const action = prompt("Type 'e' to Edit, 'd' to Delete (Unsend):");
            
            if(action === 'd') {
                if(confirm("Delete this message?")) {
                    await fetch(`/api/message/${id}`, { method: 'DELETE' });
                    loadMessages();
                }
            } else if(action === 'e') {
                const newText = prompt("Edit message:", text);
                if(newText && newText !== text) {
                    await fetch(`/api/message/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: newText })
                    });
                    loadMessages();
                }
            }
        }

        setInterval(loadMessages, 3000); // Auto-refresh every 3s
        loadMessages();
    </script>
</body>
</html>
