<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GLOW Z-SPACE | Premium Preview</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }

        /* Premium Profile Card with Neon Glow */
        .profile-card {
            background: #111;
            width: 340px;
            padding: 40px 20px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        /* Animated Avatar Frame (မီးတောက်ဘောင်) */
        .avatar-wrapper {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            position: relative;
            padding: 5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--c1), var(--c2), var(--c1));
            animation: rotateFrame 3s linear infinite;
        }

        @keyframes rotateFrame {
            100% { transform: rotate(360deg); }
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(-360deg); /* ပုံကိုမလှည့်အောင်ပြန်ထိန်းတာ */
            animation: rotateFrame 3s linear infinite reverse;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Gold Name & Neon Effect */
        .user-name {
            font-size: 24px;
            font-weight: 900;
            margin: 10px 0;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .premium-badge {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Points Box */
        .points-box {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            color: var(--c1);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Loading Animation from kkk.json */
        .loading-container {
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <div class="avatar-inner">
                <img src="B L I T Z.jpg" alt="Profile">
            </div>
        </div>

        <div class="badge-row">
            <span class="premium-badge">SUPREME</span>
            <span class="premium-badge">LEGEND</span>
        </div>

        <h2 class="user-name">Toe Tat Aung</h2>
        <div class="points-box">
            <i class="fas fa-coins" style="color:#ffd700"></i>
            Points: 999,999
        </div>

        <div class="loading-container">
            <lottie-player 
                src="kkk.json"  
                background="transparent"  
                speed="1"  
                style="width: 60px; height: 60px; margin: auto;"  
                loop  
                autoplay>
            </lottie-player>
            <p style="font-size: 10px; color: #555; margin-top: -10px;">SYSTEM ACTIVE</p>
        </div>
    </div>

</body>
</html>
