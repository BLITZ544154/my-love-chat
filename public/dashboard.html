<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1: #00f2ff; --c2: #ff0055; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 600; color: var(--c1); letter-spacing: 2px; }
        
        .container { padding: 25px; max-width: 500px; margin: auto; text-align: center; }
        
        .profile-section {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(255, 0, 85, 0.1));
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-img { width: 80px; height: 80px; background: var(--c1); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #000; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu-item {
            background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222;
            transition: 0.3s; cursor: pointer;
        }
        .menu-item:hover { border-color: var(--c1); transform: translateY(-5px); }
        .menu-item i { font-size: 25px; color: var(--c2); margin-bottom: 10px; display: block; }
        
        .logout-btn { color: #ff4444; background: none; border: 1px solid #333; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-top: 30px; width: 100%; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">BLITZ APP</div>
        <i class="fas fa-bell" style="color: var(--c1);"></i>
    </div>

    <div class="container">
        <div class="profile-section">
            <div class="profile-img"><i class="fas fa-user"></i></div>
            <h2 id="user-name" style="margin: 0;">User Name</h2>
            <p id="user-phone" style="color: #888; margin: 5px 0;">09xxxxxxxxx</p>
            <div style="margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 15px;">
                <span style="color: var(--c1);"><i class="fas fa-coins"></i> Points: 1000</span>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item"><i class="fas fa-comments"></i><span>Chat Room</span></div>
            <div class="menu-item"><i class="fas fa-heart"></i><span>Matches</span></div>
            <div class="menu-item"><i class="fas fa-gift"></i><span>Rewards</span></div>
            <div class="menu-item"><i class="fas fa-cog"></i><span>Settings</span></div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout <i class="fas fa-sign-out-alt"></i></button>
    </div>

    <script>
        // Register အောင်မြင်တုန်းက နာမည်ကို ခဏပြရအောင် (လက်ရှိမှာတော့ static ပဲ ထားမယ်)
        // နောက်ပိုင်းမှာ Login စနစ်နဲ့ ချိတ်ရင် ဒါက အလိုအလျောက် ပြောင်းသွားမှာပါ
        function logout() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
