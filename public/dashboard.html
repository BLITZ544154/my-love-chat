<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Dashboard</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; }
        
        .profile-card { 
            background:#111; width:340px; padding:60px 20px 40px; border-radius:40px; 
            text-align:center; border:1px solid #222; position:relative; overflow:hidden;
        }

        .cover-bg { position:absolute; top:0; left:0; width:100%; height:140px; background:linear-gradient(to bottom, rgba(0,242,255,0.1), transparent); z-index:0; object-fit: cover; }
        
        .settings-btn { position:absolute; top:20px; right:20px; width:40px; height:40px; background:rgba(255,255,255,0.05); border-radius:12px; display:flex; justify-content:center; align-items:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer; z-index:10; transition: 0.3s; }
        .settings-btn:hover { background: var(--c1); color: #000; }

        .avatar-wrapper { width:120px; height:120px; margin:0 auto 20px; position:relative; z-index:1; padding:5px; border-radius:50%; background:conic-gradient(from 0deg, var(--c1), var(--c2), var(--c1)); animation:rotateFrame 4s linear infinite; }
        @keyframes rotateFrame { 100% { transform:rotate(360deg); } }
        .avatar-inner { width:100%; height:100%; background:#000; border-radius:50%; padding:3px; display:flex; justify-content:center; align-items:center; transform:rotate(-360deg); animation:rotateFrame 4s linear infinite reverse; }
        .avatar-inner img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        .user-name { font-size:24px; font-weight:900; color:#ffd700; text-shadow:0 0 15px rgba(255,215,0,0.5); margin:10px 0; }
        .user-handle { font-size:12px; color: var(--c1); margin-top: -10px; margin-bottom: 10px; display: block; opacity: 0.8; }
        .user-bio { font-size:12px; color:#666; margin-bottom:20px; padding:0 20px; line-height:1.5; }
        
        .stats-box { background:rgba(0,242,255,0.05); border:1px solid rgba(0,242,255,0.1); padding:15px; border-radius:20px; color:var(--c1); font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px; }
        .nav-btn { width:340px; padding:18px; background:#1a1a1a; border:1px solid #333; border-radius:20px; color:#fff; font-weight:bold; margin-top:15px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition: 0.3s; }
        .nav-btn:hover { border-color: var(--c1); background: #222; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="cover-bg" id="current-bg"></div>
        <div class="settings-btn" onclick="window.location.href='settings'">
            <i class="fas fa-cog"></i>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar-inner">
                <img src="B L I T Z.jpg" alt="Profile" id="main-avatar">
            </div>
        </div>
        
        <h2 class="user-name" id="display-name">Loading...</h2>
        <span class="user-handle" id="display-handle">@username</span>
        <p class="user-bio" id="display-bio">No bio yet.</p>

        <div class="stats-box">
            <i class="fas fa-coins" style="color:#ffd700"></i> Points: 999,999
        </div>

        <div style="margin-top:25px;">
            <lottie-player src="kkk.json" background="transparent" speed="1" style="width: 50px; height: 50px; margin: auto;" loop autoplay></lottie-player>
            <p style="font-size:9px; color:#444; letter-spacing:2px;">ENCRYPTED SESSION</p>
        </div>
    </div>

    <button class="nav-btn" onclick="alert('Coming Soon!')">
        <span><i class="fas fa-comments"></i> GLOBAL CHAT</span>
        <i class="fas fa-chevron-right"></i>
    </button>

    <script>
        // Data များကို Sync လုပ်ခြင်း
        const syncProfile = () => {
            document.getElementById('display-name').innerText = localStorage.getItem('glow_user') || "Guest User";
            document.getElementById('display-handle').innerText = localStorage.getItem('user_handle') ? "@" + localStorage.getItem('user_handle') : "@username";
            document.getElementById('display-bio').innerText = localStorage.getItem('user_bio') || "Hey there! I'm using Z-SPACE.";
            
            // Avatar Update
            if(localStorage.getItem('user_avatar')) {
                document.getElementById('main-avatar').src = localStorage.getItem('user_avatar');
            }
            
            // Background Update
            if(localStorage.getItem('user_bg')) {
                document.getElementById('current-bg').style.background = `url(${localStorage.getItem('user_bg')}) center/cover`;
            }
        };

        syncProfile();
    </script>
</body>
</html>
