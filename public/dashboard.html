<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff4b2b;
            --bg: #050508;
            --card-bg: #0a1214;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            height: 100vh;
        }

        .profile-card {
            background: var(--card-bg);
            width: 320px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #111;
        }

        /* Top Buttons */
        .top-btn {
            position: absolute;
            top: 20px;
            width: 35px;
            height: 35px;
            background: #151f21;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            cursor: pointer;
            text-decoration: none;
        }
        .logout { left: 20px; color: #ff4b2b; }
        .settings { right: 20px; }

        /* Profile Image with Gradient Border */
        .avatar-wrapper {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            position: relative;
            padding: 4px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--card-bg);
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0 5px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .username {
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .bio {
            color: #aaa;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Points Badge */
        .badge {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--primary);
            padding: 12px;
            border-radius: 15px;
            color: var(--primary);
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* Global Chat Button */
        .global-chat-btn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            padding: 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .global-chat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <a href="index.html" class="top-btn logout" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
        </a>

        <a href="settings.html" class="top-btn settings" title="Settings">
            <i class="fas fa-cog"></i>
        </a>

        <div class="avatar-wrapper">
            <img src="https://i.ibb.co/vzPRm9r/blitz-profile.jpg" alt="BLITZ">
        </div>

        <div class="name">BLITZ 👑</div>
        <div class="username">@user_3022</div>
        <div class="bio">i'm B L I T Z</div>

        <div class="badge">
            <i class="fas fa-crown"></i> OWNER: ∞ POINTS
        </div>

        <a href="messages.html" class="global-chat-btn">
            <span><i class="fas fa-globe-americas"></i> &nbsp; GLOBAL CHAT</span>
            <i class="fas fa-chevron-right"></i>
        </a>
    </div>

    <script>
        // LocalStorage ကနေ User Data တွေကို ဆွဲထုတ်ပြီး ပြောင်းလဲနိုင်တယ်
        window.onload = () => {
            const savedName = localStorage.getItem('user_name');
            const savedBio = localStorage.getItem('user_bio');
            
            if(savedName) document.querySelector('.name').innerText = savedName + " 👑";
            if(savedBio) document.querySelector('.bio').innerText = savedBio;
        };
    </script>
</body>
</html>
