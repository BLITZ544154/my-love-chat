<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; }
        .profile-card { background:#111; width:340px; padding:60px 20px 40px; border-radius:40px; text-align:center; border:1px solid #222; position:relative; }
        .avatar-container { position:relative; width:130px; height:130px; margin:0 auto 20px; display:flex; justify-content:center; align-items:center; }
        .rotating-border { position:absolute; width:100%; height:100%; border-radius:50%; background:conic-gradient(var(--c1), var(--c2), var(--c1)); animation:rot 3s linear infinite; }
        @keyframes rot { 100% { transform:rotate(360deg); } }
        .avatar-static { width:115px; height:115px; background:#000; border-radius:50%; z-index:2; overflow:hidden; display:flex; justify-content:center; align-items:center; }
        .avatar-static img { width:100%; height:100%; object-fit:cover; }
        .settings-btn { position:absolute; top:20px; right:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="settings-btn" onclick="window.location.href='settings'"><i class="fas fa-cog"></i></div>
        <div class="avatar-container"><div class="rotating-border"></div><div class="avatar-static"><img src="B L I T Z.jpg" id="main-avatar"></div></div>
        <h2 id="d-name">Loading...</h2>
        <p id="d-ph" style="color:var(--c1); font-size:12px;"></p>
        <p id="d-bio" style="font-size:12px; color:#666;"></p>
        <div style="background:rgba(0,242,255,0.05); padding:15px; border-radius:20px; color:#ffd700;">Points: 999,999</div>
    </div>
    <script>
        if(!localStorage.getItem('isLoggedIn')) window.location.href='/';
        const ph = localStorage.getItem('user_phone');
        document.getElementById('d-name').innerText = localStorage.getItem('glow_user') || "User";
        document.getElementById('d-ph').innerText = "PH: " + ph;
        document.getElementById('d-bio').innerText = localStorage.getItem('user_bio') || "Hey there!";
        if(localStorage.getItem('user_avatar')) document.getElementById('main-avatar').src = localStorage.getItem('user_avatar');
    </script>
</body>
</html>
