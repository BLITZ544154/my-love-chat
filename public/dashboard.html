<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Dashboard</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; }
        
        /* Profile Card & Avatar Styles */
        .profile-card { background:#111; width:340px; padding:60px 20px 40px; border-radius:40px; text-align:center; border:1px solid #222; position:relative; overflow:hidden; }
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
        .rotating-border { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, var(--c1), var(--c2), var(--c1)); animation: rotateFrame 3s linear infinite; }
        @keyframes rotateFrame { 100% { transform: rotate(360deg); } }
        .avatar-static { position: relative; width: 115px; height: 115px; background: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 2; }
        .avatar-static img { width: 100%; height: 100%; object-fit: cover; }

        .settings-btn, .logout-btn { position:absolute; top:20px; width:40px; height:40px; background:rgba(255,255,255,0.05); border-radius:12px; display:flex; justify-content:center; align-items:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer; z-index:10; }
        .settings-btn { right:20px; }
        .logout-btn { left:20px; color: #ff0055; }

        .user-name { font-size:24px; font-weight:900; color:#ffd700; margin:10px 0; }
        .stats-box { background:rgba(0,242,255,0.05); padding:15px; border-radius:20px; color:var(--c1); font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px; margin-top: 15px; }
    </style>
</head>
<body>
    <script>
        // အကောင့်ဝင်မထားရင် Login Page ကို ပြန်ပို့မယ်
        if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = '/';
    </script>

    <div class="profile-card">
        <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
        <div class="settings-btn" onclick="window.location.href='settings'"><i class="fas fa-cog"></i></div>
        
        <div class="avatar-container">
            <div class="rotating-border"></div>
            <div class="avatar-static"><img src="B L I T Z.jpg" id="main-avatar"></div>
        </div>

        <h2 class="user-name" id="display-name">Loading...</h2>
        <span style="color:var(--c1); font-size:12px;" id="display-handle">@username</span>
        <p id="display-bio" style="font-size:12px; color:#666; margin:15px 0;">Z-SPACE User</p>
        
        <div class="stats-box"><i class="fas fa-coins" style="color:#ffd700"></i> Points: 999,999</div>
    </div>

    <script>
        const syncData = () => {
            document.getElementById('display-name').innerText = localStorage.getItem('glow_user') || "User";
            document.getElementById('display-handle').innerText = "@" + (localStorage.getItem('glow_user') || "user");
            document.getElementById('display-bio').innerText = localStorage.getItem('user_bio') || "Hey there! I'm using Z-SPACE.";
            if(localStorage.getItem('user_avatar')) document.getElementById('main-avatar').src = localStorage.getItem('user_avatar');
        };
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = '/';
        }
        
        syncData();
    </script>
</body>
</html>
