<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
        #box { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
        .msg { max-width:75%; padding:10px 14px; border-radius:18px; font-size:14px; cursor:pointer; }
        .me { background:var(--c1); color:#000; align-self:flex-end; }
        .other { background:#1a1a1a; align-self:flex-start; }
        .edit-tag { font-size:9px; opacity:0.5; margin-left:5px; }
        .input { padding:15px; background:#111; display:flex; gap:10px; }
        input { flex:1; background:#222; border:none; padding:12px; border-radius:20px; color:#fff; }
    </style>
</head>
<body>
    <div id="box"></div>
    <div class="input">
        <input type="text" id="in" placeholder="Aa" onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--c1); border:none; padding:10px 20px; border-radius:20px;">Send</button>
    </div>
    <script>
        const sender = localStorage.getItem('user_phone');
        const receiver = new URLSearchParams(window.location.search).get('user');

        async function load() {
            const res = await fetch(`/api/messages/${sender}/${receiver}`);
            const msgs = await res.json();
            document.getElementById('box').innerHTML = msgs.map(m => `
                <div class="msg ${m.sender === sender ? 'me' : 'other'}" onclick="opt('${m._id}', '${m.text}', '${m.sender}')">
                    ${m.text} ${m.isEdited ? '<span class="edit-tag">(edited)</span>' : ''}
                </div>
            `).join('');
            document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
        }

        async function send() {
            const el = document.getElementById('in');
            if(!el.value) return;
            await fetch('/api/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sender, receiver, text:el.value}) });
            el.value = ''; load();
        }

        function opt(id, text, s) {
            if(s !== sender) return;
            const a = prompt("Type 'e' to Edit, 'd' to Delete:");
            if(a === 'd') fetch(`/api/message/${id}`, {method:'DELETE'}).then(load);
            if(a === 'e') {
                const nt = prompt("Edit:", text);
                if(nt) fetch(`/api/message/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:nt})}).then(load);
            }
        }
        setInterval(load, 3000); load();
    </script>
</body>
</html>
