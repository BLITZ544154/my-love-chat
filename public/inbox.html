<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Z-SPACE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --card: #0d1117; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .call-btns { display: flex; gap: 20px; font-size: 18px; color: var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: var(--primary); color: black; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: #1c2128; color: white; border-bottom-left-radius: 4px; }
        .input-area { padding: 15px; background: #0a0a0a; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #222; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #161b22; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .action-btn { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .recording { color: #ff4b2b; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #typing-status { font-size: 11px; color: var(--primary); margin-left: 55px; height: 15px; font-style: italic; }
        .seen-status { font-size: 10px; align-self: flex-end; margin-top: -8px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <a href="/messages" style="color:white; text-decoration:none;"><i class="fas fa-chevron-left"></i></a>
            <img id="peer-img" src="https://via.placeholder.com/45" class="avatar">
            <div>
                <h4 id="peer-name" style="margin:0; font-size: 15px;">Loading...</h4>
                <small id="peer-status" style="color: #888; font-size: 10px;">offline</small>
            </div>
        </div>
        <div class="call-btns">
            <i class="fas fa-phone-alt" style="cursor:pointer;" onclick="startCall('voice')"></i>
            <i class="fas fa-video" style="cursor:pointer;" onclick="startCall('video')"></i>
        </div>
    </div>

    <div id="chat-box"></div>
    <div id="typing-status"></div>

    <div class="input-area">
        <div class="input-row">
            <button class="action-btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
                <i class="fas fa-microphone"></i>
            </button>
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button class="action-btn" onclick="sendText()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const socket = io({ auth: { token } });
        const myPhone = localStorage.getItem('user_phone');
        const peerPhone = new URLSearchParams(window.location.search).get('user');
        
        if(!myPhone) window.location.href = '/';

        let typingTimeout;
        const notiSound = new Audio('https://res.cloudinary.com/dmup7sh9r/video/upload/v1740484766/mixkit-correct-answer-tone-2870_wcc8un.wav');

        async function init() {
            const res = await fetch(`/api/user/${peerPhone}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const user = await res.json();
            if(user) {
                document.getElementById('peer-name').innerText = user.name;
                document.getElementById('peer-img').src = user.avatar || "https://via.placeholder.com/45";
            }
            loadMsgs();
        }

        // Typing Indicator Logic
        function handleKeyPress(e) {
            if(e.key === 'Enter') {
                sendText();
            } else {
                socket.emit('typing', { receiver: peerPhone });
            }
        }

        socket.on('is_typing', (data) => {
            if(data.sender === peerPhone) {
                document.getElementById('typing-status').innerText = 'typing...';
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    document.getElementById('typing-status').innerText = '';
                }, 2000);
            }
        });

        // New Message & Sound Logic
        socket.on('new-message', (msg) => {
            if(msg.senderPhone === peerPhone || msg.senderPhone === myPhone) {
                appendMessage(msg);
                if(msg.senderPhone === peerPhone) {
                    notiSound.play().catch(e => {});
                    socket.emit('mark_seen', { sender: peerPhone });
                }
            }
        });

        socket.on('messages_read', (data) => {
            if(data.by === peerPhone) {
                const statusLabels = document.querySelectorAll('.seen-status');
                statusLabels.forEach(label => label.innerText = 'Seen');
            }
        });

        function appendMessage(m, prepend = false) {
            const box = document.getElementById('chat-box');
            const isMe = m.senderPhone === myPhone;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            
            if(m.type === 'audio') {
                div.innerHTML = `<audio controls style="height:35px; width:180px;"><source src="${m.text}"></audio>`;
            } else {
                div.innerText = m.text;
            }

            box.appendChild(div);
            
            if(isMe) {
                const seenLabel = document.createElement('div');
                seenLabel.className = 'seen-status';
                seenLabel.innerText = m.isSeen ? 'Seen' : 'Sent';
                box.appendChild(seenLabel);
            }

            box.scrollTop = box.scrollHeight;
        }

        async function loadMsgs() {
            const res = await fetch(`/api/messages/${myPhone}/${peerPhone}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            data.forEach(m => appendMessage(m));
            socket.emit('mark_seen', { sender: peerPhone });
        }

        async function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';
            
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ receiver: peerPhone, text: text })
            });
        }

        // Recording logic (Keep your original logic but ensure token is used)
        // [ယူထားသော mediaRecorder logic များ ဤနေရာတွင် ဆက်လက်ရှိနေမည်...]

        init();
    </script>
</body>
</html>
