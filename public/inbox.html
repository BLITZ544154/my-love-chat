<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Inbox | Z-SPACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; height:100vh; display:flex; flex-direction:column; overflow: hidden; }
        
        /* Chat Header */
        .chat-header { padding:15px 20px; background:#111; border-bottom:1px solid #222; display:flex; align-items:center; justify-content:space-between; z-index: 10; }
        .user-info { display:flex; align-items:center; gap:12px; }
        .user-info .avatar { width:40px; height:40px; border-radius:50%; background:#222; display:flex; justify-content:center; align-items:center; border:1px solid var(--c1); }
        .target-name { font-weight:900; font-size:15px; }

        /* Message Display Area */
        #chat-box { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; scroll-behavior: smooth; }
        
        .msg { max-width:75%; padding:12px 16px; border-radius:18px; font-size:14px; position:relative; line-height:1.4; word-wrap: break-word; }
        .msg.other { background:#1a1a1a; align-self:flex-start; border-bottom-left-radius:2px; color: #eee; }
        .msg.me { background:var(--c1); color:#000; align-self:flex-end; border-bottom-right-radius:2px; font-weight:600; }
        
        .time { font-size:9px; opacity:0.5; margin-top:5px; display:block; text-align: right; }
        .chat-img { max-width:100%; border-radius:10px; margin-top:5px; display:block; }

        /* Input Area */
        .input-area { padding:15px; background:#111; display:flex; gap:10px; align-items: center; border-top: 1px solid #222; }
        input { flex:1; background:#1a1a1a; border:1px solid #333; padding:12px 18px; border-radius:25px; color:#fff; outline:none; }
        .icon-btn { color:#555; font-size:20px; cursor:pointer; }
        .send-btn { background:var(--c1); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="user-info">
            <i class="fas fa-arrow-left" onclick="window.location.href='messages'"></i>
            <div class="avatar"><i class="fas fa-user" style="font-size:14px; color:var(--c1)"></i></div>
            <div>
                <div class="target-name" id="target-display">Loading...</div>
                <div style="font-size:10px; color:var(--c1)">Online Now</div>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color:#333"></i>
    </div>

    <div id="chat-box">
        </div>

    <div class="input-area">
        <i class="fas fa-image icon-btn" onclick="document.getElementById('img-input').click()"></i>
        <input type="file" id="img-input" hidden accept="image/*" onchange="sendImage(this)">
        
        <input type="text" id="msg-input" placeholder="Aa" onkeypress="if(event.key==='Enter') sendMessage()">
        
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane" style="color:#000; font-size:14px;"></i>
        </button>
    </div>

    <script>
        const myPhone = "09688543022";
        const sender = localStorage.getItem('user_phone');
        const urlParams = new URLSearchParams(window.location.search);
        const receiver = urlParams.get('user'); // URL ကနေ တစ်ဖက်လူ ID ကိုယူမယ်

        // တစ်ဖက်လူ နာမည်ပြဖို့
        document.getElementById('target-display').innerText = (receiver === myPhone) ? "OWNER 👑" : "User_" + receiver.slice(-4);

        // Chat Key (နှစ်ယောက်ကြား သီးသန့် Key တစ်ခုတည်းဖြစ်အောင် ဖုန်းနံပါတ်အငယ်ကို ရှေ့ထားမယ်)
        const chatKey = [sender, receiver].sort().join('_chat_');

        function loadMessages() {
            const chatBox = document.getElementById('chat-box');
            const history = JSON.parse(localStorage.getItem(chatKey) || "[]");
            
            chatBox.innerHTML = history.map(m => `
                <div class="msg ${m.from === sender ? 'me' : 'other'}">
                    ${m.type === 'img' ? `<img src="${m.data}" class="chat-img">` : m.data}
                    <span class="time">${m.time}</span>
                </div>
            `).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            saveMessage(input.value, 'text');
            input.value = '';
        }

        function sendImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => saveMessage(e.target.result, 'img');
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveMessage(data, type) {
            const history = JSON.parse(localStorage.getItem(chatKey) || "[]");
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            
            history.push({ from: sender, data: data, type: type, time: timeStr });
            localStorage.setItem(chatKey, JSON.stringify(history));
            loadMessages();
        }

        // စာမျက်နှာဖွင့်တာနဲ့ စာတွေဆွဲတင်မယ်
        loadMessages();

        // ၅ စက္ကန့်တစ်ခါ စာသစ်ရှိမရှိ စစ်မယ် (Real-time အတု)
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
