<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --chat-bg: #0d1117; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; background: #0a0a0a; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 14px; }
        .me { align-self: flex-end; background: var(--primary); color: black; }
        .other { align-self: flex-start; background: #222; color: white; }
        .input-area { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="messages" style="color:white;"><i class="fas fa-arrow-left"></i></a>
        <img id="peer-img" src="https://via.placeholder.com/45" class="avatar">
        <div>
            <h4 id="peer-name" style="margin:0;">Loading...</h4>
            <small id="peer-status" style="color: #555;">Private Chat</small>
        </div>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button class="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <script>
        const myPhone = localStorage.getItem('user_phone');
        const peerPhone = new URLSearchParams(window.location.search).get('user');

        async function init() {
            const res = await fetch(`/api/user/${peerPhone}`);
            const user = await res.json();
            if(user) {
                document.getElementById('peer-name').innerText = user.name;
                document.getElementById('peer-img').src = user.avatar || "https://via.placeholder.com/45";
                // Privacy Real အလုပ်လုပ်ပုံ: Nobody ဆိုရင် ဖုန်းနံပါတ်မပြဘူး
                document.getElementById('peer-status').innerText = user.privacy?.showNumber === 'Nobody' ? 'Number Hidden' : user.phone;
            }
            loadMsgs();
            setInterval(loadMsgs, 3000);
        }

        async function loadMsgs() {
            const res = await fetch(`/api/messages/${myPhone}/${peerPhone}`);
            const data = await res.json();
            document.getElementById('chat-box').innerHTML = data.map(m => `
                <div class="msg ${m.sender === myPhone ? 'me' : 'other'}">${m.text}</div>
            `).join('');
            document.getElementById('chat-box').scrollTop = 99999;
        }

        async function send() {
            const text = document.getElementById('msg-input').value;
            if(!text) return;
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sender: myPhone, receiver: peerPhone, text })
            });
            document.getElementById('msg-input').value = '';
            loadMsgs();
        }
        init();
    </script>
</body>
</html>
