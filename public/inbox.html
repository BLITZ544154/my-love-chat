<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --me-bg: #00f2ff; --other-bg: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { padding: 12px 15px; background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #111; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; padding: 5px; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--primary); }
        .user-status h4 { margin: 0; font-size: 15px; color: #eee; }
        .user-status span { font-size: 11px; color: var(--primary); opacity: 0.8; }

        /* Chat Messages Area */
        #inbox-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; cursor: pointer; }
        
        .me { align-self: flex-end; background: var(--me-bg); color: #000; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--other-bg); color: #fff; border-bottom-left-radius: 4px; }
        
        .time { font-size: 9px; opacity: 0.5; margin-top: 4px; display: block; text-align: right; }
        .edited { font-size: 9px; font-style: italic; opacity: 0.6; margin-left: 5px; }

        /* Input Bar */
        .input-bar { padding: 10px 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #111; }
        #message-in { flex: 1; background: #1a1a1a; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 14px; }
        .action-btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
        .send-btn { background: var(--primary); color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="messages.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="user-profile">
                <img id="header-img" src="https://i.ibb.co/vzPRm9r/blitz-profile.jpg" alt="User">
                <div class="user-status">
                    <h4 id="target-name">User Name</h4>
                    <span>online</span>
                </div>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color: #555;"></i>
    </div>

    <div id="inbox-content"></div>

    <div class="input-bar">
        <button class="action-btn"><i class="far fa-smile"></i></button>
        <input type="text" id="message-in" placeholder="Write a message..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="action-btn send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const myId = localStorage.getItem('user_phone') || 'Guest';
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('user') || 'Global';

        document.getElementById('target-name').innerText = targetId;

        async function fetchMessages() {
            try {
                const response = await fetch(`/api/messages/${myId}/${targetId}`);
                const data = await response.json();
                const container = document.getElementById('inbox-content');
                
                container.innerHTML = data.map(m => `
                    <div class="bubble ${m.sender === myId ? 'me' : 'other'}" onclick="msgMenu('${m._id}', '${m.text}', '${m.sender}')">
                        ${m.text} ${m.isEdited ? '<span class="edited">(edited)</span>' : ''}
                        <span class="time">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (err) { console.error("Fetch Error:", err); }
        }

        async function sendMsg() {
            const el = document.getElementById('message-in');
            if(!el.value.trim()) return;

            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sender: myId, receiver: targetId, text: el.value })
            });

            el.value = '';
            fetchMessages();
        }

        // Edit/Delete Logic
        async function msgMenu(id, oldText, owner) {
            if(owner !== myId) return;
            const op = prompt("Options: 'e' to Edit, 'd' to Delete (Unsend)");
            
            if(op === 'd') {
                await fetch(`/api/message/${id}`, { method: 'DELETE' });
                fetchMessages();
            } else if(op === 'e') {
                const newText = prompt("Edit Message:", oldText);
                if(newText && newText !== oldText) {
                    await fetch(`/api/message/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: newText })
                    });
                    fetchMessages();
                }
            }
        }

        setInterval(fetchMessages, 3000);
        fetchMessages();
    </script>
</body>
</html>
