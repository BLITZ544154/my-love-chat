<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Z-SPACE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --card: #0d1117; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .call-btns { display: flex; gap: 20px; font-size: 18px; color: var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--primary); color: black; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: #1c2128; color: white; border-bottom-left-radius: 4px; }
        .input-area { padding: 15px; background: #0a0a0a; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #161b22; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .action-btn { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .recording { color: #ff4b2b; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <a href="/messages" style="color:white; text-decoration:none;"><i class="fas fa-chevron-left"></i></a>
            <img id="peer-img" src="https://via.placeholder.com/45" class="avatar">
            <div>
                <h4 id="peer-name" style="margin:0; font-size: 15px;">Loading...</h4>
                <small id="peer-status" style="color: #00ff00; font-size: 10px;">online</small>
            </div>
        </div>
        <div class="call-btns">
            <i class="fas fa-phone-alt" style="cursor:pointer;" onclick="startCall('voice')"></i>
            <i class="fas fa-video" style="cursor:pointer;" onclick="startCall('video')"></i>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <button class="action-btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key==='Enter') sendText()">
        <button class="action-btn" onclick="sendText()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const socket = io();
        const myPhone = localStorage.getItem('user_phone');
        if(!myPhone) window.location.href = '/';
        const peerPhone = new URLSearchParams(window.location.search).get('user');
        
        let mediaRecorder;
        let audioChunks = [];
        let currentStream;

        socket.emit('join-room', myPhone);

        async function init() {
            const res = await fetch(`/api/user/${peerPhone}`);
            const user = await res.json();
            if(user) {
                document.getElementById('peer-name').innerText = user.name;
                document.getElementById('peer-img').src = user.avatar || "https://via.placeholder.com/45";
            }
            loadMsgs();
        }

        socket.on('new-message', (msg) => {
            if((msg.sender === peerPhone && msg.receiver === myPhone) || (msg.sender === myPhone && msg.receiver === peerPhone)) {
                appendMessage(msg);
            }
        });

        function appendMessage(m) {
            const box = document.getElementById('chat-box');
            const isMe = m.sender === myPhone;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            
            if(m.text.startsWith('data:audio')) {
                div.innerHTML = `<audio controls style="height:35px; width:180px;"><source src="${m.text}"></audio>`;
            } else {
                div.innerText = m.text;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function loadMsgs() {
            const res = await fetch(`/api/messages/${myPhone}/${peerPhone}`);
            const data = await res.json();
            document.getElementById('chat-box').innerHTML = '';
            data.forEach(appendMessage);
        }

        async function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            const msgData = { sender: myPhone, receiver: peerPhone, text: text };
            
            input.value = '';
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(msgData)
            });
        }

        async function startRecording() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(currentStream);
                audioChunks = [];
                mediaRecorder.start();
                document.getElementById('voice-btn').classList.add('recording');
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        await fetch('/api/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sender: myPhone, receiver: peerPhone, text: reader.result })
                        });
                    };
                    // မိုက်ခရိုဖုန်းကို ပြန်ပိတ်မယ်
                    currentStream.getTracks().forEach(track => track.stop());
                };
            } catch (err) { alert("Mic Access Denied!"); }
        }

        function stopRecording() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                document.getElementById('voice-btn').classList.remove('recording');
            }
        }

        function startCall(type) {
            window.location.href = `call.html?user=${peerPhone}&caller=true&type=${type}`;
        }

        socket.on('incoming-call', (data) => {
            if(confirm(`Incoming ${data.type} call from ${data.name || data.from}. Accept?`)) {
                window.location.href = `call.html?user=${data.from}&caller=false`;
            }
        });

        init();
    </script>
</body>
</html>
