<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ | Login</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1: #00f2ff; --c2: #ff0055; --bg: #050508; }
        body { 
            margin: 0; background: var(--bg); color: #fff; height: 100vh;
            display: flex; justify-content: center; align-items: center; font-family: 'Outfit', sans-serif;
        }
        .auth-card { 
            background: rgba(15, 15, 20, 0.9); padding: 40px 30px; border-radius: 35px;
            border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; width: 90%; max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        h2 { color: var(--c1); margin-bottom: 30px; letter-spacing: 3px; }
        .input-box { position: relative; margin-bottom: 15px; }
        .input-box i { position: absolute; left: 15px; top: 18px; color: #555; }
        input { 
            width: 100%; padding: 15px 15px 15px 45px; border-radius: 15px; 
            border: 1px solid #222; background: #000; color: #fff; font-size: 15px;
        }
        .btn { 
            background: linear-gradient(45deg, var(--c1), var(--c2)); border: none; 
            padding: 16px; border-radius: 15px; color: #fff; font-weight: bold; width: 100%; 
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn:disabled { opacity: 0.5; }
        #otp-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="auth-card" id="reg-form">
        <h2>REGISTER</h2>
        <div class="input-box"><i class="fas fa-user"></i><input type="text" id="reg-name" placeholder="သင့်နာမည်"></div>
        <div class="input-box"><i class="fas fa-phone"></i><input type="text" id="reg-phone" placeholder="ဖုန်းနံပါတ်"></div>
        <div class="input-box"><i class="fas fa-envelope"></i><input type="email" id="reg-email" placeholder="လက်ခံမည့် Gmail"></div>
        <div class="input-box"><i class="fas fa-lock"></i><input type="password" id="reg-pass" placeholder="Password"></div>
        
        <button class="btn" id="reg-btn" onclick="requestOTP()">GET OTP</button>

        <div id="otp-section" style="display:none;">
            <div class="input-box"><i class="fas fa-key"></i><input type="text" id="otp-input" placeholder="OTP ၆ လုံး ရိုက်ပါ"></div>
            <button class="btn" onclick="verifyOTP()" style="background: var(--c1); color: #000;">VERIFY</button>
        </div>
    </div>

    <script>
        const socket = io();
        const regBtn = document.getElementById('reg-btn');

        function requestOTP() {
            const data = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-pass').value
            };
            if(!data.email.includes('@')) return alert("Gmail မှန်အောင် ရိုက်ပါ");
            
            regBtn.disabled = true;
            regBtn.innerHTML = "Sending...";
            socket.emit('request_otp', data);
        }

        socket.on('otp_sent', () => {
            alert("အောင်မြင်ပါသည်! Gmail ကို စစ်ဆေးပါ");
            document.getElementById('otp-section').style.display = 'block';
            regBtn.innerHTML = "OTP Sent ✅";
        });

        socket.on('error_msg', (msg) => {
            alert(msg);
            regBtn.disabled = false;
            regBtn.innerHTML = "GET OTP";
        });

        socket.on('register_success', () => { alert("အောင်မြင်ပါသည်!"); location.reload(); });

        function verifyOTP() {
            socket.emit('verify_otp', { 
                email: document.getElementById('reg-email').value, 
                otp: document.getElementById('otp-input').value 
            });
        }
    </script>
</body>
</html>
