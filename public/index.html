<!DOCTYPE html>
<html>
<head>
    <title>❤️ Our Private Space</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --my-bubble: #ff4d94; --other-bubble: #ffffff; --bg-color: #fce7f3; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); display: flex; flex-direction: column; height: 100vh; }
        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .my-msg { align-self: flex-end; background: var(--my-bubble); color: white; }
        .other-msg { align-self: flex-start; background: var(--other-bubble); color: #333; }
        .user-name { font-size: 10px; margin-bottom: 2px; opacity: 0.8; }
        #form { background: white; padding: 10px; display: flex; gap: 5px; }
        #input { border: 1px solid #ddd; padding: 10px; flex-grow: 1; border-radius: 20px; outline: none; }
        #form > button { background: var(--my-bubble); border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="စာရိုက်ပါ..." /><button type="submit">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messagesList = document.getElementById('messages');

        let myName = localStorage.getItem('chat-name') || prompt("သင့်နာမည်ကို ရိုက်ထည့်ပါ:") || "User";
        localStorage.setItem('chat-name', myName);

        function addMessageToUI(msg) {
            const item = document.createElement('li');
            const isMe = msg.user === myName;
            item.className = `message ${isMe ? 'my-msg' : 'other-msg'}`;
            item.innerHTML = `<div class="user-name">${msg.user}</div><div>${msg.text}</div>`;
            messagesList.appendChild(item);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // စာဟောင်းတွေပြမယ်
        socket.on('load messages', (msgs) => {
            messagesList.innerHTML = '';
            msgs.forEach(addMessageToUI);
        });

        // စာအသစ်ဝင်လာရင်ပြမယ်
        socket.on('chat message', (msg) => {
            addMessageToUI(msg);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', { user: myName, text: input.value });
                input.value = '';
            }
        });
    </script>
</body>
</html>
