<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .login-box { width: 320px; text-align: center; padding: 40px 20px; }
        .logo { font-size: 80px; color: var(--primary); margin-bottom: 20px; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        
        h2 { margin-bottom: 10px; font-size: 24px; }
        p { color: #555; font-size: 14px; margin-bottom: 30px; }

        .input-group { background: #111; border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #222; margin-bottom: 20px; }
        .input-group i { color: #444; }
        .input-group input { background: none; border: none; color: white; outline: none; width: 100%; font-size: 16px; }

        .start-btn { 
            width: 100%; background: var(--primary); color: black; border: none; 
            padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }
        .start-btn:hover { transform: translateY(-3px); background: #00d2ff; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo"><i class="fab fa-telegram-plane"></i></div>
        <h2>Z-SPACE</h2>
        <p>The safest and fastest chat engine.</p>

        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="text" id="phone" placeholder="Your Phone Number" onkeypress="if(event.key==='Enter') start()">
        </div>

        <button class="start-btn" onclick="start()">START MESSAGING</button>
    </div>

    <script>
        function start() {
            const phone = document.getElementById('phone').value.trim();
            if(!phone) {
                alert("Please enter your phone number to continue!");
                return;
            }

            // Save user identity to LocalStorage
            localStorage.setItem('user_phone', phone);
            
            // Redirect to main page
            window.location.href = 'main.html';
        }

        // Redirect if already logged in
        window.onload = () => {
            if(localStorage.getItem('user_phone')) {
                window.location.href = 'main.html';
            }
        };
    </script>
</body>
</html>
