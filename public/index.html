<!DOCTYPE html>
<html>
<head>
    <title>Our Love Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 3rem; background: #fdf2f8; }
        #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
        #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
        #input:focus { outline: none; }
        #form > button { background: #ec4899; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; cursor: pointer; }
        #messages { list-style-type: none; margin: 0; padding: 0; }
        #messages > li { padding: 0.5rem 1rem; background: white; margin: 5px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="စာရိုက်ပါ..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // နာမည်မေးမယ် (ယာယီ)
        const username = prompt("သင့်နာမည်ကို ရိုက်ထည့်ပါ:") || "Anonymous";

        // စာဟောင်းတွေကို Database ကနေ ပြန်ပြမယ်
        socket.on('load messages', (msgs) => {
            msgs.forEach(msg => {
                displayMessage(msg);
            });
            window.scrollTo(0, document.body.scrollHeight);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', { user: username, text: input.value });
                input.value = '';
            }
        });

        socket.on('chat message', (msg) => {
            displayMessage(msg);
            window.scrollTo(0, document.body.scrollHeight);
        });

        function displayMessage(msg) {
            const item = document.createElement('li');
            item.innerHTML = `<strong>${msg.user}:</strong> ${msg.text}`;
            messages.appendChild(item);
        }
    </script>
</body>
</html>
