<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; overflow: hidden; }
        .auth-card { background:#111; width:320px; padding:40px 20px; border-radius:35px; text-align:center; border:1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width:100%; background:#1a1a1a; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; outline:none; box-sizing:border-box; margin-bottom:12px; transition: 0.3s; }
        input:focus { border-color: var(--c1); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .btn { width:100%; padding:15px; background:var(--c1); border:none; border-radius:15px; font-weight:900; cursor:pointer; margin-top:10px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .toggle-link { font-size:12px; color:#555; margin-top:20px; cursor:pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 style="color:var(--c1); margin-bottom:5px; letter-spacing: 5px;">Z-SPACE</h1>
        <p id="auth-title" style="font-size:10px; letter-spacing:2px; color:#444; margin-bottom:30px;">PREMIUM ENCRYPTED ACCESS</p>

        <div id="auth-form">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()" id="btn-text">LOGIN</button>
        </div>

        <div class="toggle-link" onclick="toggleMode()" id="toggle-text">Don't have an account? Register</div>
    </div>

    <script>
        let isLogin = true;

        // Auto-Login Logic: Login ဝင်ထားရင် Dashboard ကို တန်းလွှတ်မယ်
        if(localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard';
        }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('btn-text').innerText = isLogin ? 'LOGIN' : 'REGISTER';
            document.getElementById('auth-title').innerText = isLogin ? 'PREMIUM ENCRYPTED ACCESS' : 'CREATE NEW ACCOUNT';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
        }

        function handleAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            if(!u || !p) return alert("Please fill all fields!");

            if(isLogin) {
                // Login လုပ်ငန်းစဉ်
                const storedPass = localStorage.getItem('user_pass_' + u);
                if(storedPass === p) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('glow_user', u); // Dashboard မှာ နာမည်ပြဖို့
                    window.location.href = 'dashboard';
                } else {
                    alert("Invalid Username or Password!");
                }
            } else {
                // Register လုပ်ငန်းစဉ်
                if(localStorage.getItem('user_pass_' + u)) {
                    return alert("Username already exists!");
                }
                localStorage.setItem('user_pass_' + u, p);
                alert("Account Created Successfully! Please Login.");
                toggleMode();
            }
        }
    </script>
</body>
</html>
