<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ Login</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin:0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: rgba(20,20,30,0.95); padding: 40px 25px; border-radius: 30px; border: 2px solid var(--c1); text-align: center; width: 90%; max-width: 380px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; }
        .btn { background: linear-gradient(45deg, var(--c1), var(--c2)); border: none; padding: 16px; border-radius: 12px; color: #fff; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="auth-card" id="reg-form">
        <h2 style="color:var(--c1)">REGISTER</h2>
        <input type="text" id="reg-name" placeholder="သင့်နာမည်">
        <input type="text" id="reg-phone" placeholder="ဖုန်းနံပါတ်">
        <input type="email" id="reg-email" placeholder="Gmail လိပ်စာ">
        <input type="password" id="reg-pass" placeholder="Password">
        <button class="btn" id="reg-btn" onclick="requestOTP()">GET OTP</button>

        <div id="otp-section" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            <input type="text" id="otp-input" placeholder="OTP ၆ လုံး ရိုက်ပါ">
            <button class="btn" onclick="verifyOTP()">VERIFY & REGISTER</button>
        </div>
    </div>

    <script>
        const socket = io();
        const regBtn = document.getElementById('reg-btn');

        function requestOTP() {
            const data = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-pass').value
            };
            if(!data.email.includes('@')) return alert("Gmail မှန်အောင် ရိုက်ပါ");
            
            regBtn.disabled = true;
            regBtn.innerHTML = "Sending OTP...";
            socket.emit('request_otp', data);
        }

        socket.on('otp_sent', () => {
            alert("OTP ပို့ပြီးပါပြီ!");
            document.getElementById('otp-section').style.display = 'block';
            regBtn.innerHTML = "OTP Sent ✅";
        });

        socket.on('register_success', () => { alert("Register အောင်မြင်ပါသည်!"); location.reload(); });
        socket.on('error_msg', (msg) => { alert(msg); regBtn.disabled = false; regBtn.innerHTML = "GET OTP"; });
        
        function verifyOTP() {
            const email = document.getElementById('reg-email').value;
            const otp = document.getElementById('otp-input').value;
            socket.emit('verify_otp', { email, otp });
        }
    </script>
</body>
</html>
