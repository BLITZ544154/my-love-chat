<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>BLITZ Community</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; --card:rgba(20,20,30,0.9); }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .active { display: flex; justify-content: center; align-items: center; }

        /* Auth Card Center Alignment */
        .auth-card { 
            background: var(--card); 
            padding: 40px 25px; 
            border-radius: 30px; 
            border: 2px solid var(--c1); 
            text-align: center; 
            width: 90%; 
            max-width: 380px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            font-size: 16px;
            text-align: center; /* စာရိုက်ရင် အလယ်ကပေါ်အောင် */
        }

        .btn { 
            background: linear-gradient(45deg, var(--c1), var(--c2)); 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            color: #fff; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
        }
        
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Dashboard UI */
        #main-screen { justify-content: flex-start; align-items: stretch; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); }
        
        /* Chat */
        #chat-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-card" id="reg-form">
            <h2 style="color:var(--c1); margin-top:0;">REGISTER</h2>
            <input type="text" id="reg-name" placeholder="နာမည်">
            <input type="text" id="reg-phone" placeholder="ဖုန်းနံပါတ်">
            <input type="email" id="reg-email" placeholder="Gmail လိပ်စာ (OTP အတွက်)">
            <input type="password" id="reg-pass" placeholder="Password">
            
            <button class="btn" id="reg-btn" onclick="requestOTP()">
                <i class="fas fa-paper-plane"></i> GET OTP
            </button>

            <div id="otp-section" style="display:none; margin-top:15px; border-top: 1px solid #333; padding-top: 15px;">
                <input type="text" id="otp-input" placeholder="OTP ၆ လုံး ရိုက်ပါ">
                <button class="btn" onclick="verifyOTP()" style="background:var(--c1); color:#000;">REGISTER NOW</button>
            </div>
            
            <p onclick="showLogin()" style="font-size:13px; margin-top:20px; cursor:pointer; color:var(--c1);">အကောင့်ရှိပြီးသားလား? Login ဝင်မည်</p>
        </div>

        <div class="auth-card" id="login-form" style="display:none;">
            <h2 style="color:var(--c1); margin-top:0;">LOGIN</h2>
            <input type="text" id="login-phone" placeholder="ဖုန်းနံပါတ်">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn" onclick="login()">LOGIN</button>
            <p onclick="showRegister()" style="font-size:13px; margin-top:20px; cursor:pointer; color:var(--c1);">အကောင့်မရှိသေးရင် Register လုပ်ပါ</p>
        </div>
    </div>

    <div id="main-screen" class="screen">
        </div>

    <script>
        const socket = io();
        const regBtn = document.getElementById('reg-btn');

        function requestOTP() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || !phone || !email || !pass) return alert("အချက်အလက် အကုန်ဖြည့်ပါဗျာ။");
            if(!email.includes('@')) return alert("Gmail လိပ်စာ မှန်အောင် ရိုက်ပါဗျာ။");

            // သိသာအောင် Button ကို Loading ပြောင်းမယ်
            regBtn.disabled = true;
            regBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ခဏစောင့်ပါ...';

            socket.emit('request_otp', { name, phone, email, password: pass });
        }

        socket.on('otp_sent', () => {
            alert("အောင်မြင်ပါသည်! သင့် Gmail ထဲကို OTP ကုဒ် ပို့လိုက်ပါပြီ။");
            regBtn.innerHTML = '<i class="fas fa-check"></i> OTP ပို့ပြီးပါပြီ';
            document.getElementById('otp-section').style.display = 'block';
        });

        socket.on('error_msg', (msg) => {
            alert(msg);
            regBtn.disabled = false;
            regBtn.innerHTML = '<i class="fas fa-paper-plane"></i> GET OTP';
        });

        // တခြား JavaScript Logic များ (verifyOTP, login စသည်) ဒီအောက်မှာ ဆက်ထည့်ပါ...
        function showLogin() { document.getElementById('reg-form').style.display='none'; document.getElementById('login-form').style.display='block'; }
        function showRegister() { document.getElementById('reg-form').style.display='block'; document.getElementById('login-form').style.display='none'; }
    </script>
</body>
</html>
