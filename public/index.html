<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
        .auth-card { background:#111; width:320px; padding:40px 20px; border-radius:35px; text-align:center; border:1px solid #222; }
        input { width:100%; background:#1a1a1a; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; outline:none; box-sizing:border-box; margin-bottom:12px; }
        .btn { width:100%; padding:15px; background:var(--c1); border:none; border-radius:15px; font-weight:900; cursor:pointer; }
        .toggle-link { font-size:12px; color:#555; margin-top:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 style="color:var(--c1); letter-spacing:3px;">Z-SPACE</h1>
        <p id="auth-title" style="font-size:10px; color:#444; margin-bottom:30px;">PHONE NUMBER AUTHENTICATION</p>
        <input type="tel" id="phone" placeholder="Phone (e.g. 09...)">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="btn-text">LOGIN</button>
        <div class="toggle-link" onclick="toggleMode()" id="toggle-text">New here? Register with Phone</div>
    </div>
    <script>
        let isLogin = true;
        if(localStorage.getItem('isLoggedIn')) window.location.href = 'dashboard';
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('btn-text').innerText = isLogin ? 'LOGIN' : 'REGISTER';
            document.getElementById('toggle-text').innerText = isLogin ? "New here? Register with Phone" : "Back to Login";
        }
        function handleAuth() {
            const ph = document.getElementById('phone').value;
            const p = document.getElementById('pass').value;
            if(isLogin) {
                if(localStorage.getItem('up_'+ph) === p) {
                    localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('user_phone', ph); window.location.href = 'dashboard';
                } else { alert("Error!"); }
            } else {
                localStorage.setItem('up_'+ph, p); alert("Registered!"); toggleMode();
            }
        }
    </script>
</body>
</html>
