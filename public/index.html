<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Private Chat ❤️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; }
        #chat-container { max-width: 600px; margin: auto; height: 100vh; display: flex; flex-direction: column; background: #fff; }
        
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; display: flex; flex-direction: column; }
        
        .msg { margin-bottom: 10px; padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; position: relative; }
        .received { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .img-msg { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        
        #input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; }
        
        .btn { cursor: pointer; font-size: 20px; border: none; background: none; }
        #send-btn { color: #075e54; font-weight: bold; }
        #image-input { display: none; }
    </style>
</head>
<body>

<header>Our Private Chat ❤️</header>

<div id="chat-container">
    <ul id="messages"></ul>
    
    <div id="input-area">
        <label for="image-input" class="btn">📷</label>
        <input type="file" id="image-input" accept="image/*">
        
        <input type="text" id="text-input" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="send-btn" class="btn">ပို့မည်</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const msgList = document.getElementById('messages');
    const textInput = document.getElementById('text-input');
    const imageInput = document.getElementById('image-input');

    // စာပို့ရန်
    document.getElementById('send-btn').onclick = () => {
        if(textInput.value) {
            socket.emit('chat message', { content: textInput.value });
            textInput.value = '';
        }
    };

    // Enter ခေါက်ရင် စာပို့ဖို့
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    // ပုံပို့ရန်
    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                socket.emit('send image', { content: event.target.result });
            };
            reader.readAsDataURL(file);
        }
    };

    // စာသားများကို ပြသရန်
    socket.on('chat message', (data) => {
        appendMessage(data.content, 'text');
    });

    // ပုံများကို ပြသရန်
    socket.on('display image', (data) => {
        appendMessage(data.content, 'image');
    });

    function appendMessage(content, type) {
        const li = document.createElement('li');
        li.className = 'msg received'; // လောလောဆယ် အကုန်ဘယ်ဘက်ကပ်ပြမယ်
        
        if (type === 'text') {
            li.textContent = content;
        } else {
            const img = document.createElement('img');
            img.src = content;
            img.className = 'img-msg';
            li.appendChild(img);
        }
        
        msgList.appendChild(li);
        msgList.scrollTop = msgList.scrollHeight;
    }
</script>
</body>
</html>
