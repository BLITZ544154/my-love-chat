<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Messages | Z-SPACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --c2:#ff0055; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; padding:20px; }
        
        .header { display:flex; align-items:center; gap:15px; margin-bottom:25px; }
        .header h2 { margin:0; font-weight:900; letter-spacing:1px; }

        /* Search Bar */
        .search-box { background:#111; padding:12px 15px; border-radius:15px; border:1px solid #222; display:flex; align-items:center; gap:10px; margin-bottom:25px; }
        .search-box input { background:none; border:none; color:#fff; outline:none; width:100%; font-size:14px; }

        /* Chat Item Style */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-item { background:#111; padding:15px; border-radius:22px; border:1px solid #222; display:flex; align-items:center; gap:15px; cursor:pointer; transition:0.3s; }
        .chat-item:active { transform: scale(0.98); background:#161616; border-color: var(--c1); }
        
        .avatar { width:55px; height:55px; border-radius:50%; background:linear-gradient(45deg, #1a1a1a, #222); border: 2px solid #333; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .avatar i { font-size: 20px; color: var(--c1); }

        .chat-info { flex:1; }
        .chat-info .name { font-weight:900; font-size:15px; margin-bottom:3px; display: flex; align-items: center; gap: 5px; }
        .chat-info .last-msg { font-size:12px; color:#555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        
        .time { font-size:10px; color:#333; }
        .vip-badge { color: #ffd700; font-size: 10px; }

        /* Empty State */
        .empty-hint { text-align: center; color: #333; margin-top: 50px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard'" style="cursor:pointer"></i>
        <h2>Chats</h2>
    </div>

    <div class="search-box">
        <i class="fas fa-search" style="color:#333"></i>
        <input type="text" placeholder="Search people..." id="search-input">
    </div>

    <div class="chat-list" id="chat-container">
        </div>

    <div class="empty-hint" id="empty-msg">
        <i class="fas fa-comment-slash" style="font-size:30px; margin-bottom:10px; display:block;"></i>
        No conversations yet.<br>Start a chat from someone's profile.
    </div>

    <script>
        const myPhone = "09688543022";

        // Chat စာရင်းကို Render လုပ်တဲ့ Function
        function loadChats() {
            const container = document.getElementById('chat-container');
            const emptyHint = document.getElementById('empty-msg');
            
            // LocalStorage ထဲက 'chat_' နဲ့စတဲ့ key တွေကို ရှာမယ်
            const chats = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('chat_')) {
                    const parts = key.split('_');
                    // ကိုယ်နဲ့ပြောထားတဲ့ တခြားတစ်ယောက်ရဲ့ ID ကို ယူမယ်
                    const otherUser = parts.find(p => p !== 'chat' && p !== localStorage.getItem('user_phone'));
                    if (otherUser) chats.push(otherUser);
                }
            }

            // Duplicate တွေဖျက်မယ်
            const uniqueUsers = [...new Set(chats)];

            if (uniqueUsers.length > 0) {
                emptyHint.style.display = 'none';
                container.innerHTML = uniqueUsers.map(user => `
                    <div class="chat-item" onclick="window.location.href='inbox?user=${user}'">
                        <div class="avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="chat-info">
                            <div class="name">
                                ${user === myPhone ? 'OWNER <i class="fas fa-crown vip-badge"></i>' : 'User_' + user.slice(-4)}
                            </div>
                            <div class="last-msg">Tap to start conversation...</div>
                        </div>
                        <div class="time">Just now</div>
                    </div>
                `).join('');
            }
        }

        loadChats();
    </script>
</body>
</html>
