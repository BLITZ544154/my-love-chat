<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .header { padding: 20px; font-size: 20px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #111; }
        .list { padding: 10px; }
        .fab { position: fixed; bottom: 20px; right: 20px; background: var(--primary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">Z-SPACE MESSAGES</div>
    <div class="list" id="chat-list">
        <p style="text-align: center; color: #333; margin-top: 50px;">Click the + button to start a private chat</p>
    </div>
    <div class="fab" onclick="newChat()"><i class="fas fa-plus"></i></div>

    <script>
        function newChat() {
            const p = prompt("Enter phone number to chat:");
            if(p) window.location.href = `inbox.html?user=${p}`;
        }
    </script>
</body>
</html>
