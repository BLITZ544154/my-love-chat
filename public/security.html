<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security | Z-SPACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; --card-bg: #0a1214; --danger: #ff4b2b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 30px; }
        
        .container { width: 340px; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .header a { color: white; text-decoration: none; font-size: 18px; }

        .sec-item { 
            background: var(--card-bg); padding: 15px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 12px; border: 1px solid #111; cursor: pointer;
        }
        .sec-info { display: flex; align-items: center; gap: 15px; }
        .sec-info i { font-size: 18px; color: var(--primary); width: 25px; text-align: center; }
        .sec-text h4 { margin: 0; font-size: 14px; }
        .sec-text p { margin: 2px 0 0; font-size: 11px; color: #555; }

        .toggle { width: 35px; height: 18px; background: #222; border-radius: 10px; position: relative; }
        .toggle.on { background: var(--primary); }
        .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle.on::after { left: 19px; }

        .danger-zone { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .delete-btn { color: var(--danger); font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="settings.html"><i class="fas fa-arrow-left"></i></a>
            <h3 style="margin:0;">Privacy & Security</h3>
        </div>

        <div class="sec-item" onclick="this.querySelector('.toggle').classList.toggle('on')">
            <div class="sec-info">
                <i class="fas fa-shield-alt"></i>
                <div class="sec-text">
                    <h4>Two-Step Verification</h4>
                    <p>Add an extra layer of security</p>
                </div>
            </div>
            <div class="toggle"></div>
        </div>

        <div class="sec-item">
            <div class="sec-info">
                <i class="fas fa-user-lock"></i>
                <div class="sec-text">
                    <h4>Blocked Users</h4>
                    <p>0 users blocked</p>
                </div>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 12px; color: #333;"></i>
        </div>

        <div class="sec-item">
            <div class="sec-info">
                <i class="fas fa-laptop"></i>
                <div class="sec-text">
                    <h4>Active Sessions</h4>
                    <p>Manage your logged-in devices</p>
                </div>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 12px; color: #333;"></i>
        </div>

        <div class="sec-item" onclick="this.querySelector('.toggle').classList.toggle('on')">
            <div class="sec-info">
                <i class="fas fa-eye-slash"></i>
                <div class="sec-text">
                    <h4>Passcode Lock</h4>
                    <p>Lock app with a 4-digit code</p>
                </div>
            </div>
            <div class="toggle on"></div>
        </div>

        <div class="danger-zone">
            <div class="delete-btn" onclick="clearData()">
                <i class="fas fa-trash-alt"></i>
                <span>Clear All Chat History & Data</span>
            </div>
        </div>
    </div>

    <script>
        function clearData() {
            if(confirm("Are you sure? This will delete all your local data and log you out.")) {
                localStorage.clear();
                window.parent.location.href = 'index.html'; // Logout to login page
            }
        }
    </script>
</body>
</html>
