<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; padding:20px; }
        .menu-item { background:#111; padding:18px; border-radius:20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; border:1px solid #222; cursor:pointer; }
        .menu-info { display:flex; align-items:center; gap:15px; }
        .menu-info i { color:var(--c1); }
    </style>
</head>
<body>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;"><i class="fas fa-arrow-left" onclick="window.location.href='dashboard'"></i><h2>Settings</h2></div>
    <div class="menu-list">
        <div class="menu-item" onclick="window.location.href='edit-profile'"><div class="menu-info"><i class="fas fa-user-edit"></i><div>Edit Profile</div></div><i class="fas fa-chevron-right"></i></div>
        <div class="menu-item" onclick="window.location.href='appearance'"><div class="menu-info"><i class="fas fa-palette"></i><div>Appearance (Shop)</div></div><i class="fas fa-chevron-right"></i></div>
        <div class="menu-item" onclick="window.location.href='security'"><div class="menu-info"><i class="fas fa-lock"></i><div>Security & 2FA</div></div><i class="fas fa-chevron-right"></i></div>
        <div class="menu-item" onclick="window.location.href='about-device'"><div class="menu-info"><i class="fas fa-mobile"></i><div>About Device</div></div><i class="fas fa-chevron-right"></i></div>
        <div class="menu-item" onclick="localStorage.clear(); window.location.href='/'"><div class="menu-info" style="color:#ff0055"><i class="fas fa-sign-out-alt"></i><div>Logout</div></div></div>
    </div>
</body>
</html>
