<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; padding:20px; }
        .menu-item { background:#111; padding:18px; border-radius:20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; border:1px solid #222; cursor:pointer; transition:0.3s; }
        .menu-item:active { transform:scale(0.98); background:#161616; border-color:var(--c1); }
        .menu-info { display:flex; align-items:center; gap:15px; }
        .menu-info i { color:var(--c1); font-size:18px; width:25px; text-align:center; }
        .title { font-weight:900; font-size:15px; }
        .desc { font-size:11px; color:#555; }
    </style>
</head>
<body>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard'" style="cursor:pointer"></i>
        <h2 style="margin:0">Settings</h2>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="window.location.href='edit-profile'">
            <div class="menu-info"><i class="fas fa-user-circle"></i><div><div class="title">Edit Profile</div><div class="desc">Name, Bio & Avatar</div></div></div>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="menu-item" onclick="window.location.href='appearance'">
            <div class="menu-info"><i class="fas fa-palette"></i><div><div class="title">Appearance</div><div class="desc">Themes & Custom Colors</div></div></div>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="menu-item" onclick="window.location.href='security'">
            <div class="menu-info"><i class="fas fa-shield-alt"></i><div><div class="title">Security</div><div class="desc">Password & 2FA Setup</div></div></div>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="menu-item" onclick="window.location.href='about-device'">
            <div class="menu-info"><i class="fas fa-mobile-alt"></i><div><div class="title">About Device</div><div class="desc">Sessions & Device Info</div></div></div>
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>
</body>
</html>
