<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Z-SPACE | Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; padding:20px; }
        .edit-card { background:#111; padding:25px; border-radius:30px; border:1px solid #222; }
        .input-box { margin-bottom:20px; }
        label { display:block; font-size:11px; color:var(--c1); letter-spacing:2px; margin-bottom:10px; }
        input, textarea { width:100%; background:#1a1a1a; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; outline:none; box-sizing:border-box; font-family:inherit; }
        .save-btn { width:100%; padding:18px; background:var(--c1); border:none; border-radius:20px; font-weight:900; color:#000; cursor:pointer; transition:0.3s; }
        .save-btn:active { transform:scale(0.95); }
    </style>
</head>
<body>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
        <i class="fas fa-arrow-left" onclick="history.back()" style="cursor:pointer"></i>
        <h2 style="margin:0">Settings</h2>
    </div>

    <div class="edit-card">
        <div class="input-box">
            <label>DISPLAY NAME</label>
            <input type="text" id="in-name">
        </div>
        <div class="input-box">
            <label>BIO</label>
            <textarea id="in-bio" rows="3"></textarea>
        </div>
        <div class="input-box">
            <label>PHONE PRIVACY</label>
            <div style="display:flex; justify-content:space-between; align-items:center; background:#1a1a1a; padding:15px; border-radius:15px;">
                <span style="font-size:14px; color:#888;">Hide Number</span>
                <input type="checkbox" id="in-hide" style="width:20px; height:20px;">
            </div>
        </div>
        <button class="save-btn" onclick="save()">SAVE CHANGES</button>
    </div>

    <script>
        document.getElementById('in-name').value = localStorage.getItem('glow_user') || "";
        document.getElementById('in-bio').value = localStorage.getItem('user_bio') || "";
        document.getElementById('in-hide').checked = localStorage.getItem('phone_hidden') === 'true';

        function save() {
            localStorage.setItem('glow_user', document.getElementById('in-name').value);
            localStorage.setItem('user_bio', document.getElementById('in-bio').value);
            localStorage.setItem('phone_hidden', document.getElementById('in-hide').checked);
            alert("Updated! 🚀");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
