<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --c1:#00f2ff; --bg:#050508; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; padding:20px; }
        .menu-item { background:#111; padding:18px; border-radius:20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; border:1px solid #222; cursor:pointer; }
        .menu-info { display:flex; align-items:center; gap:15px; }
        .menu-info i { color:var(--c1); width:20px; text-align:center; }
        .title { font-weight:900; font-size:15px; }
        .desc { font-size:11px; color:#555; }
        .theme-dots { display:flex; gap:10px; margin-top:5px; }
        .dot { width:15px; height:15px; border-radius:50%; border:2px solid #fff; cursor:pointer; }
    </style>
</head>
<body>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard'" style="cursor:pointer"></i>
        <h2>Settings</h2>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="window.location.href='edit-profile'">
            <div class="menu-info"><i class="fas fa-user-circle"></i><div><div class="title">Edit Profile</div><div class="desc">Avatar, Bio & Privacy</div></div></div>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="menu-item" style="cursor:default">
            <div class="menu-info"><i class="fas fa-palette"></i><div><div class="title">Appearance</div>
                <div class="theme-dots">
                    <div class="dot" style="background:#00f2ff" onclick="setTheme('cyan')"></div>
                    <div class="dot" style="background:#ff0055" onclick="setTheme('pink')"></div>
                    <div class="dot" style="background:#ffd700" onclick="setTheme('gold')"></div>
                </div>
            </div></div>
        </div>

        <div class="menu-item" onclick="showDevice()">
            <div class="menu-info"><i class="fas fa-mobile-alt"></i><div><div class="title">About Device</div><div class="desc">System Information</div></div></div>
            <i class="fas fa-info-circle"></i>
        </div>

        <div class="menu-item" onclick="alert('Coming Soon')"><div class="menu-info"><i class="fas fa-shield-alt"></i><div><div class="title">Security</div><div class="desc">Password Protection</div></div></div><i class="fas fa-chevron-right"></i></div>
    </div>

    <script>
        function setTheme(color) {
            localStorage.setItem('app_theme', color);
            alert("Theme updated! Refreshing...");
            window.location.reload();
        }
        function showDevice() {
            alert("Platform: " + navigator.platform + "\nAgent: " + (navigator.userAgent.includes("Android") ? "Android" : "iOS/Web"));
        }
    </script>
</body>
</html>
